name: Tests

on:
  push:
    branches: [v2]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '7.4', laravel: '7.*', testbench: '5.*' }
          - { php: '8.0', laravel: '7.*', testbench: '5.*' }
          - { php: '7.4', laravel: '8.*', testbench: '6.*' }
          - { php: '8.1', laravel: '8.*', testbench: '6.*' }
          - { php: '8.0', laravel: '9.*', testbench: '7.*' }
          - { php: '8.2', laravel: '9.*', testbench: '7.*' }
          - { php: '8.1', laravel: '10.*', testbench: '8.*' }
          - { php: '8.3', laravel: '10.*', testbench: '8.*' }

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/database:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}" --no-interaction --no-update
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
